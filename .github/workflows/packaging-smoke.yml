name: packaging-smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  systemd:
    name: systemd smoke (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p mylan-agent
      - name: Install service
        run: |
          sudo useradd -r -s /usr/sbin/nologin mylan || true
          sudo mkdir -p /var/lib/mylan /etc/mylan
          sudo cp agent/mylan-agent.toml /etc/mylan/
          sudo cp target/release/mylan-agent /usr/bin/
          sudo cp agent/systemd/mylan-agent.service /etc/systemd/system/
          sudo chown -R mylan:mylan /var/lib/mylan
          sudo systemctl daemon-reload
      - name: Start + verify embedded API
        run: |
          sudo systemctl start mylan-agent
          sleep 10
          systemctl is-active mylan-agent
          # C1 fix: /status requiere bearer token; el agent lo genera en
          # /var/lib/mylan/api-token (0600 owned by mylan) al arrancar.
          TOKEN=$(sudo cat /var/lib/mylan/api-token)
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:43117/api/v1/status
      - name: Stop
        if: always()
        run: sudo systemctl stop mylan-agent || true

  docker:
    name: docker smoke (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build (amd64)
        run: |
          docker buildx build --platform linux/amd64 -f agent/docker/Dockerfile -t mylan-agent:smoke --load .
      - name: Run + healthcheck
        run: |
          docker run -d --name mylan-agent -p 43117:43117 mylan-agent:smoke
          sleep 20
          # C1 fix: /status requiere bearer token; el agent lo genera dentro del
          # container en /var/lib/mylan/api-token (root-owned, container corre
          # como root). Se lee via docker exec.
          # C2 fix: el agent bind 127.0.0.1 del container (ADR-4, no 0.0.0.0); el
          # curl debe correr DENTRO del container (docker exec), no desde el
          # host — el puerto publicado -p no enruta a 127.0.0.1 del container.
          TOKEN=$(docker exec mylan-agent cat /var/lib/mylan/api-token)
          docker exec mylan-agent curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:43117/api/v1/status
      - name: Cleanup
        if: always()
        run: docker stop mylan-agent || true; docker rm mylan-agent || true

  rpi:
    name: rpi cross-build (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Add aarch64 target
        run: rustup target add aarch64-unknown-linux-gnu
      - name: Install cross linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Cross-build
        env:
          # Preventive: the `cc` crate (libsqlite3-sys bundled via rusqlite)
          # looks for `${target}-gcc` = aarch64-unknown-linux-gnu-gcc, but apt
          # provides aarch64-linux-gnu-gcc (no `unknown`). Without CC_<TRIPLE>
          # the cc crate may fall back to the host cc and emit x86_64 SQLite
          # objects. cc crate v1.2.65 respects CC_<TRIPLE>/AR_<TRIPLE>.
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --target aarch64-unknown-linux-gnu -p mylan-agent
      - name: Verify binary exists
        run: test -f target/aarch64-unknown-linux-gnu/release/mylan-agent

  windows:
    name: windows smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned toolchain
        run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release -p mylan-agent
      # Windows service (SCM) integration es Step 5 pendiente
      # (windows_service.rs::install_service es stub; main.rs no despacha
      # StartServiceCtrlDispatcher -> sc.exe start falla con 1053). Smoke
      # prueba el agent como PROCESO (igual que systemd/docker smoke):
      # arranca, sirve API en 127.0.0.1:43117, /status responde. El config
      # ad-hoc usa db_path en PROGRAMDATA (el config compartido tiene
      # /var/lib/mylan, ruta Unix inválida en Windows).
      - name: Run agent (process smoke)
        shell: pwsh
        run: |
          $bin = (Resolve-Path target\release\mylan-agent.exe).Path
          $cfgDir = Join-Path $env:PROGRAMDATA "mylan"
          New-Item -ItemType Directory -Force -Path $cfgDir | Out-Null
          $dbPath = Join-Path $cfgDir "mylan.db"
          $cfgPath = Join-Path $cfgDir "mylan-agent.toml"
          $dbPathEsc = $dbPath -replace '\\', '\\'
          @"
          interval_secs = 60
          api_port = 43117
          db_path = "$dbPathEsc"
          [[networks]]
          cidr = "192.168.1.0/24"
          profile = "quick"
          "@ | Out-File -FilePath $cfgPath -Encoding utf8
          $proc = Start-Process -FilePath $bin -ArgumentList "--serve-api","--config",$cfgPath -NoNewWindow -PassThru
          $proc.Id | Out-File -FilePath "$env:RUNNER_TEMP\mylan-agent.pid"
      - name: Verify + stop
        shell: pwsh
        run: |
          Start-Sleep -Seconds 10
          $cfgDir = Join-Path $env:PROGRAMDATA "mylan"
          $token = Get-Content (Join-Path $cfgDir "api-token") -Raw
          curl.exe -sf -H "Authorization: Bearer $token" http://127.0.0.1:43117/api/v1/status
          $agentPid = Get-Content "$env:RUNNER_TEMP\mylan-agent.pid"
          Stop-Process -Id $agentPid -Force