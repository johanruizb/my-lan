name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Instala la toolchain pinneada por rust-toolchain.toml (channel 1.96.0 + rustfmt/clippy).
      - name: Install pinned toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      # AC-2: cobertura de la frontera Core (mylan-core + mylan-db + mylan-fingerprint) con umbral 80%.
      # Baseline actual: 89.80% líneas (AC-3). llvm-tools-preview viene de rust-toolchain.toml.
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage (Core frontier, umbral 80%)
        run: cargo llvm-cov -p mylan-core -p mylan-db -p mylan-fingerprint --fail-under-lines 80 --lcov --output-path lcov.info

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-core-frontier
          path: lcov.info
